services:
  gateway:
    build: .
    image: pp-claw:latest
    container_name: pp-claw-gateway
    ports:
      - "18790:18790"
    volumes:
      - ~/.pp-claw:/root/.pp-claw
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    command: ["gateway"]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  cli:
    image: pp-claw:latest
    container_name: pp-claw-cli
    volumes:
      - ~/.pp-claw:/root/.pp-claw
    environment:
      - TZ=Asia/Shanghai
    command: ["chat"]
    stdin_open: true
    tty: true
    profiles:
      - cli
